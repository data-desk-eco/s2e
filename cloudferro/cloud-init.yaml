#cloud-config
# box setup: node 22 + gdal + duckdb, clone s2-flares, and point gdal at the
# anonymous in-region eodata S3 (free JP2 reads from inside WAW3-2). cf-run then
# needs no secrets — `node cf-run.js --source cdse ...`.
package_update: true
packages: [git, gdal-bin, build-essential, ca-certificates, curl, unzip]
runcmd:
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - curl -fsSL https://install.duckdb.org | bash || true
  - su - ubuntu -c 'git clone https://github.com/louisgv/s2-flares.git s2-flares && cd s2-flares && npm install gdal-async'
  - |
    cat >/etc/profile.d/eodata.sh <<'ENV'
    export AWS_S3_ENDPOINT=data.cloudferro.com
    export AWS_ACCESS_KEY_ID=CLOUDFERRO
    export AWS_SECRET_ACCESS_KEY=PUBLIC
    export AWS_VIRTUAL_HOSTING=FALSE
    export AWS_HTTPS=YES
    ENV
