<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>s2-flares manual test</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #ccc; padding: 20px; }
        #log { white-space: pre-wrap; font-size: 12px; }
        button { margin: 4px; padding: 6px 12px; }
    </style>
</head>
<body>
    <h3>s2-flares manual test</h3>
    <p>Permian Basin bbox, last 3 months. Open DevTools console for details.</p>
    <button id="start">Start Detection</button>
    <button id="cancel" disabled>Cancel</button>
    <div id="log"></div>
    <script type="module">
        const log = document.getElementById('log');
        const startBtn = document.getElementById('start');
        const cancelBtn = document.getElementById('cancel');

        function append(msg) {
            log.textContent += msg + '\n';
            console.log(msg);
        }

        let worker = null;

        startBtn.addEventListener('click', () => {
            if (worker) worker.terminate();

            // Small Permian Basin test area (near Pecos, TX)
            const bbox = [-103.6, 31.3, -103.4, 31.5];
            const end = new Date().toISOString().slice(0, 10);
            const start = new Date(Date.now() - 90 * 86400000).toISOString().slice(0, 10);

            append(`Starting detection: bbox=${JSON.stringify(bbox)}, ${start} to ${end}`);

            worker = new Worker('../worker.js', { type: 'module' });
            startBtn.disabled = true;
            cancelBtn.disabled = false;

            worker.onmessage = (e) => {
                const msg = e.data;
                switch (msg.type) {
                    case 'detections':
                        append(`  detections: ${msg.features.length} on ${msg.date}`);
                        break;
                    case 'progress':
                        append(`  progress: ${msg.done}/${msg.total} images`);
                        break;
                    case 'clusters':
                        append(`  clusters: ${msg.features.length} found`);
                        for (const c of msg.features) {
                            append(`    [${c.lon.toFixed(4)}, ${c.lat.toFixed(4)}] B12=${c.max_b12.toFixed(2)} dates=${c.detection_count}`);
                        }
                        break;
                    case 'error':
                        append(`  ERROR: ${msg.message}`);
                        break;
                    case 'done':
                        append('Done.');
                        startBtn.disabled = false;
                        cancelBtn.disabled = true;
                        break;
                }
            };

            worker.onerror = (err) => {
                append(`Worker error: ${err.message}`);
                startBtn.disabled = false;
                cancelBtn.disabled = true;
            };

            worker.postMessage({
                type: 'detect', bbox, start, end,
                clusterOptions: { minDates: 1, minAvgB12: 0.5 }
            });
        });

        cancelBtn.addEventListener('click', () => {
            if (worker) {
                worker.postMessage({ type: 'cancel' });
                worker.terminate();
                worker = null;
                append('Cancelled.');
            }
            startBtn.disabled = false;
            cancelBtn.disabled = true;
        });
    </script>
</body>
</html>
